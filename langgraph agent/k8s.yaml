apiVersion: apps/v1
kind: Deployment
metadata:
  name: conv-ui
  namespace: conv-ui-qa
  labels:
    app.kubernetes.io/name: conv-ui
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: conv-ui
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: conv-ui
    spec:
      imagePullSecrets:
      - name: acr-secret
      containers:
        - name: conv-ui-qa
          image: transit.azurecr.io/conv_ui:latest
          imagePullPolicy: Always
          # Environment configuration should be provided via ConfigMap or Secret
          # Example:
          # envFrom:
          #   - configMapRef:
          #       name: conv-ui-config
          #   - secretRef:
          #       name: conv-ui-secrets
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          resources:
            requests:
              cpu: "200m"
              memory: "1Gi"
            limits:
              cpu: "500m"
              memory: "1Gi"
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: conv-ui
  namespace: conv-ui-qa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: conv-ui
  minReplicas: 1
  maxReplicas: 2
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: v1
kind: Service
metadata:
  name: conv-ui
  namespace: conv-ui-qa
  labels:
    app.kubernetes.io/name: conv-ui
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: conv-ui
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: conv-ui-ingress
  namespace: conv-ui-qa
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/use-regex: "true"
spec:
  ingressClassName: nginx
   #tls:
   #- hosts:
     #- test-conv-ui.ecolane.com
     #secretName: conv-ui-qa-tls-secret
  rules:
    - http:
        paths:
          - path: /conv-ui-qa(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: conv-ui
                port:
                  number: 8000
